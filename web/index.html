<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Web With Roni</title>
<style>
body{margin:0;background:#07070f;color:#e2e8f0;font-family:system-ui}
.top{background:#0d0d1a;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #1a1a2e;position:sticky;top:0;font-size:13px}
.tabs{display:flex;gap:8px;padding:10px 16px}
.tab{padding:6px 14px;border:1px solid #1a1a2e;border-radius:8px;cursor:pointer;font-size:13px}
.tab.active{background:#00d4ff22;border-color:#00d4ff;color:#00d4ff}
.panel{display:none;padding:16px}
.panel.active{display:block}
textarea,input{width:100%;background:#0d0d1a;border:1px solid #1a1a2e;border-radius:8px;color:#e2e8f0;padding:10px;box-sizing:border-box;font-family:inherit}
button{background:linear-gradient(135deg,#00d4ff,#7c3aed);border:none;color:#fff;padding:10px 16px;border-radius:8px;cursor:pointer;font-weight:700;margin-top:8px}
.card{background:#0d0d1a;border:1px solid #1a1a2e;border-radius:10px;padding:12px;margin-bottom:8px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px}
label{font-size:12px;color:#94a3b8;display:flex;align-items:center;gap:6px;margin-top:6px}
pre{white-space:pre-wrap;font-family:inherit;margin:0}
#chatLog{display:flex;flex-direction:column;gap:10px;margin-bottom:12px}
.bubble{max-width:85%;padding:10px 14px;border-radius:12px;font-size:14px;line-height:1.5}
.me{align-self:flex-end;background:#7c3aed33;border:1px solid #7c3aed55}
.them{align-self:flex-start;background:#0d0d1a;border:1px solid #1a1a2e}
.tag{font-size:10px;color:#64748b;margin-bottom:4px}
</style></head>
<body>
<div class="top"><b>⚡ Web With Roni Private Limited</b><span id="status">loading...</span></div>
<div class="tabs">
  <div class="tab active" onclick="show('chat')">Chat</div>
  <div class="tab" onclick="show('team')">Team</div>
  <div class="tab" onclick="show('clients')">Clients</div>
  <div class="tab" onclick="show('history')">History</div>
</div>

<div id="chat" class="panel active">
  <div id="chatLog"></div>
  <textarea id="prompt" rows="2" placeholder="Type anything..."></textarea>
  <label><input type="checkbox" id="deep"> Deep reasoning mode</label>
  <button onclick="send()">Send</button>
</div>

<div id="team" class="panel"><div id="teamGrid" class="grid"></div></div>

<div id="clients" class="panel">
  <input id="cName" placeholder="Name"><br><br>
  <input id="cBiz" placeholder="Business"><br><br>
  <input id="cContact" placeholder="Contact"><br><br>
  <button onclick="addClient()">Add Client</button>
  <div id="clientList" style="margin-top:12px"></div>
</div>

<div id="history" class="panel"><div id="taskList"></div></div>

<script>
function show(id){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  event.target.classList.add('active');
  if(id==='team') loadTeam();
  if(id==='clients') loadClients();
  if(id==='history') loadTasks();
}

async function loadStatus(){
  const r = await fetch('/api/status'); const d = await r.json();
  document.getElementById('status').innerText =
    `${d.agents} agents · ${d.models_online} models · ${d.calls.calls_used} calls used`;
}

function addBubble(text, who, tag){
  const log = document.getElementById('chatLog');
  const b = document.createElement('div');
  b.className = 'bubble ' + (who==='me' ? 'me' : 'them');
  b.innerHTML = (tag ? `<div class="tag">${tag}</div>` : '') + `<pre>${text}</pre>`;
  log.appendChild(b);
  window.scrollTo(0, document.body.scrollHeight);
}

async function send(){
  const input = document.getElementById('prompt');
  const prompt = input.value.trim();
  const deep = document.getElementById('deep').checked;
  if(!prompt) return;
  addBubble(prompt, 'me');
  input.value = '';
  const thinking = document.createElement('div');
  thinking.className = 'bubble them'; thinking.id = 'thinking';
  thinking.innerText = '🧠 thinking...';
  document.getElementById('chatLog').appendChild(thinking);

  const r = await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},
    body: JSON.stringify({prompt, deep})});
  const d = await r.json();
  document.getElementById('thinking').remove();
  addBubble(d.response, 'them', `${d.agent} · ${d.complexity}`);
  loadStatus();
}

document.getElementById('prompt').addEventListener('keydown', e=>{
  if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); send(); }
});

async function loadTeam(){
  const r = await fetch('/api/team'); const agents = await r.json();
  document.getElementById('teamGrid').innerHTML = agents.map(a=>
    `<div class="card"><b>${a.name}</b><br><small>${a.dept} · ${a.code}</small></div>`).join('');
}

async function addClient(){
  const name=document.getElementById('cName').value;
  const business=document.getElementById('cBiz').value;
  const contact=document.getElementById('cContact').value;
  await fetch('/api/clients',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({name,business,contact})});
  loadClients();
}

async function loadClients(){
  const r = await fetch('/api/clients'); const list = await r.json();
  document.getElementById('clientList').innerHTML = list.map(c=>
    `<div class="card"><b>${c.name}</b> — ${c.business}<br><small>${c.contact} · ${c.status}</small></div>`).join('');
}

async function loadTasks(){
  const r = await fetch('/api/tasks'); const list = await r.json();
  document.getElementById('taskList').innerHTML = list.map(t=>
    `<div class="card"><small>${t.agent} · ${t.complexity}</small><br>${t.prompt}</div>`).join('');
}

loadStatus();
</script>
</body></html>
